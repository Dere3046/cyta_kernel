name: build
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ylarod/ddk:android16-6.12
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Build cksu
        run: make
      - uses: actions/upload-artifact@v4
        with:
          name: cksu-ko-android16-6.12
          path: cksu.ko

  build-wrapper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r27
      - name: Build init_wrapper
        run: |
          ${{ steps.ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android26-clang \
            -static -Wl,-z,max-page-size=65536 \
            -o init-wrapper/init_wrapper init-wrapper/wrapper.c
      - uses: actions/upload-artifact@v4
        with:
          name: init-wrapper
          path: init-wrapper/init_wrapper

  build-csud:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r27
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - name: Install cargo-ndk
        run: cargo install cargo-ndk
      - name: Build csud
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: cd csud && cargo ndk -t arm64-v8a build --release
      - uses: actions/upload-artifact@v4
        with:
          name: csud
          path: csud/target/aarch64-linux-android/release/csud

  build-cksu-patch:
    needs: [build-wrapper]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Download init_wrapper
        uses: actions/download-artifact@v4
        with:
          name: init-wrapper
          path: cksu-patch/assets/
      - name: Build cksu-patch
        run: cd cksu-patch && cargo build --release
      - uses: actions/upload-artifact@v4
        with:
          name: cksu-patch
          path: cksu-patch/target/release/cksu-patch
