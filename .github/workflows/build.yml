name: build
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ylarod/ddk:android16-6.12
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: make
      - uses: actions/upload-artifact@v4
        with:
          name: cksu-android16-6.12
          path: cksu.ko
